services:

  # ─────────────────────────────────────────────
  # PHP / Laravel App
  # ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    user: "1000:1000"
    container_name: schoolsys_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
    depends_on:
      mysql:
        condition: service_healthy
      pgsql:
        condition: service_healthy
    networks:
      - laravel

  # ─────────────────────────────────────────────
  # Vite Dev Server
  # ─────────────────────────────────────────────
  vite:
    image: node:20-alpine
    container_name: schoolsys_vite
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - laravel

  # ─────────────────────────────────────────────
  # Nginx
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: schoolsys_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

  # ─────────────────────────────────────────────
  # MySQL 8
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: schoolsys_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: schoolsys_db
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "laravel", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laravel

  # ─────────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────────
  pgsql:
    image: postgres:16-alpine
    container_name: schoolsys_pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laravel

  # ─────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: schoolsys_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - laravel

  # ─────────────────────────────────────────────
  # Adminer
  # ─────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: schoolsys_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - mysql
      - pgsql
    networks:
      - laravel

volumes:
  mysql_data:
  pgsql_data:

networks:
  laravel:
    driver: bridge